name: Publish Packages

on:
  workflow_dispatch: {} # Manual Trigger Only

jobs:
  publish:
    runs-on: macos-15

    strategy:
      matrix:
        node-version: [24]

    permissions:
      contents: write
      id-token: write

    steps:
      # MARK: - Checkout
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # MARK: - Setup PNPM
      - name: Install pnpm
        uses: pnpm/action-setup@v5

      # MARK: - Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # MARK: - Install Dependencies
      - name: Install dependencies
        run: pnpm install

      # MARK: - Build Packages
      - name: Build packages
        run: pnpm run build

      # MARK: - Typecheck Packages
      - name: Typecheck packages
        run: pnpm run typecheck

      # MARK: - Test Packages
      - name: Test packages
        run: pnpm run test

      # MARK: - Prepare Package Assets
      - name: Prepare package assets
        run: |
          cp README.md packages/archicat/README.md
          cp LICENSE packages/archicat/LICENSE

      # MARK: - Publish Packages
      - name: Publish packages
        run: pnpm run publish:packages

      # MARK: - Git Tag & GitHub Release
      - name: Create git tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SUMMARY_FILE="./lerna-publish-summary.json"

          if [ ! -f "$SUMMARY_FILE" ]; then
            exit 0
          fi

          VERSION=$(jq -r '.[] | select(.packageName == "archicat") | .version' "$SUMMARY_FILE" | head -n 1)

          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            exit 0
          fi

          TAG="v$VERSION"

          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            exit 0
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
